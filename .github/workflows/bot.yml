name: Twitter to Facebook & Instagram Bot

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  post-to-social:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yt-dlp playwright beautifulsoup4 instagrapi
          
      - name: Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps
      
      - name: Download state from Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          # Download state from GitHub Gist (free persistent storage)
          curl -s -H "Authorization: token $GIST_TOKEN" \
            "https://api.github.com/gists/$GIST_ID" | \
            python -c "import sys,json; d=json.load(sys.stdin); print(d.get('files',{}).get('state.json',{}).get('content','{}'))" > state.json
      
      - name: Run bot
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_SCRAPE_USERNAME: ${{ secrets.IG_SCRAPE_USERNAME }}
          IG_SCRAPE_PASSWORD: ${{ secrets.IG_SCRAPE_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          # Create config from secret
          echo "$CONFIG_JSON" > config.json
          
          # Run the bot with virtual display
          xvfb-run --auto-servernum python main.py

      - name: Upload Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            bot_run.log
            state.json
            run_report.json
            cucumber_report.json
          retention-days: 7
      
      - name: Upload state to Gist
        if: always()
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          # Save state back to Gist
          STATE=$(cat state.json | python -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -s -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/gists/$GIST_ID" \
            -d "{\"files\":{\"state.json\":{\"content\":$STATE}}}"
